name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['apps/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['apps/cli--tag_name'] }}
      version: ${{ steps.release.outputs['apps/cli--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: rv-linux
          - os: macos-latest
            target: darwin-arm64
            artifact: rv-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build --compile --define process.env.NODE_ENV='"production"' ./index.ts --outfile ./dist/${{ matrix.artifact }}
        working-directory: ./apps/cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./apps/cli/dist/${{ matrix.artifact }}
          retention-days: 1

  upload-binaries:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ./dist/rv-linux/rv-linux
            ./dist/rv-macos/rv-macos

  update-flake:
    needs: [release-please, upload-binaries]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: cachix/install-nix-action@v30

      - name: Update flake.nix with new version and hashes
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          LINUX_HASH=$(nix hash convert --to sri --hash-algo sha256 $(nix-prefetch-url "https://github.com/${{ github.repository }}/releases/download/${TAG}/rv-linux" 2>/dev/null))
          MACOS_HASH=$(nix hash convert --to sri --hash-algo sha256 $(nix-prefetch-url "https://github.com/${{ github.repository }}/releases/download/${TAG}/rv-macos" 2>/dev/null))

          sed -i "s|version = \".*\";|version = \"${VERSION}\";|" flake.nix
          sed -i "s|hash = \"sha256-.*\"; # linux-hash|hash = \"${LINUX_HASH}\"; # linux-hash|" flake.nix
          sed -i "s|hash = \"sha256-.*\"; # macos-hash|hash = \"${MACOS_HASH}\"; # macos-hash|" flake.nix

          nix flake update

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "chore: update flake to cli v${{ needs.release-please.outputs.version }}"
          git push
